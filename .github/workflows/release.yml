name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  package:
    needs: build-and-test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          if ($tag -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Tag must be in format v#.#.# (e.g. v1.0.0)"
            exit 1
          }
          "version=$tag" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Install vpk CLI
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Add dotnet tools to PATH
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.dotnet\tools"

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish src/PromptClipboard.App/PromptClipboard.App.csproj `
            -c Release -r win-x64 --self-contained `
            -o artifacts/publish `
            -p:PublishSingleFile=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version="${{ steps.version.outputs.version }}"

      - name: Download previous releases (for delta generation)
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --outputDir artifacts/velopack
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous releases (first release?) — skipping delta"
            $global:LASTEXITCODE = 0
          }

      - name: Create Velopack packages
        shell: pwsh
        run: |
          vpk pack `
            --packId PromptClipboard `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir artifacts/publish `
            --mainExe PromptClipboard.App.exe `
            --icon src/PromptClipboard.App/Resources/app.ico `
            --outputDir artifacts/velopack

      - name: Upload to GitHub Release
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --outputDir artifacts/velopack `
            --publish `
            --releaseName "Prompt Clipboard v${{ steps.version.outputs.version }}" `
            --tag "v${{ steps.version.outputs.version }}" `
            --merge
