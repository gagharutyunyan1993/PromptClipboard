name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  package:
    needs: build-and-test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be in format v#.#.# (e.g. v1.0.0)"
            exit 1
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish app
        run: |
          dotnet publish src/PromptClipboard.App/PromptClipboard.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -o artifacts/publish `
            -p:PublishSingleFile=false `
            -p:DebugType=none `
            -p:DebugSymbols=false

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/publish/*" -DestinationPath "artifacts/PromptClipboard-${{ steps.version.outputs.version }}-portable-x64.zip"

      - name: Create installer
        shell: pwsh
        run: |
          iscc /DAppVersion="${{ steps.version.outputs.version }}" packaging/installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Prompt Clipboard v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/PromptClipboard-${{ steps.version.outputs.version }}-portable-x64.zip
            artifacts/PromptClipboard-${{ steps.version.outputs.version }}-x64-setup.exe
